<!DOCTYPE html>
<html lanh="en">
<head>
    <title>Registration Form</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Registration Form</h1>
    <p>Please fill out this form with required information</p>
    <form action="post" method="#">
        <fieldset>
            <label for="first-name">Enter your first name: <input type="text" id="first-name" name="first-name" required/></label>
            <label for="last-name">Enter your last name: <input type="text" id="last-name" name="last-name" required/></label>
            <label for="email">Enter your email: <input type="email" id="email" name="email" required/></label>
            <label for="password">Create a new password: <input type="password" id="password" name="password" pattern="[a-z0-9]{8,}" required></label>
        </fieldset>
        <fieldset>
            <legend>Account type (required)</legend>
            <label for="personal-account"><input type="radio" id="personal-account" name="account-type" class="inline" checked /> Personal</label>
            <label for="business-account"><input type="radio" id="business-account" name="account-type" class="inline"/> Business</label>
        </fieldset>
        <fieldset>
            <label for="profile-picture">Upload a profile picture: <input type="file" id="profile-picture" name="profile-picture"/></label>
            <label for="age">Input your age (years): <input type="number" id="age" name="age" min="13" max="120" required/></label>
            <label for="referrer">How did you hear about us:
                <select id="referrer" name="referrer" >
                    <option value="">(select one)</option>
                    <option value="1">Youtube</option>
                    <option value="2">Instagram</option>
                    <option value="3">X</option>
                    <option value="4">Other</option>
                </select>
            </label>
            <label>Provide a bio: <textarea id="bio" name="bio" rows="3" cols="30" placeholder="I like to go swimming on the beach..."></textarea></label>
        </fieldset>
        <label for="terms-and-conditions">
            <input id="terms-and-conditions" name="terms-and-conditions" type="checkbox" class="inline" required>I accept the <a href="https://www.freecodecamp.org/news/terms-of-service/">terms and conditions</a>
        </label>
        <input type="submit" value="submit"/>
    </form>
</body>
</html>
